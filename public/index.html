<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>AITinerary · Concierge</title>
		<style>
			:root {
				/* Adventure Premium palette: forest teal + sunset amber on warm cream */
				--primary: #0f766e;
				--primary-hover: #115e59;
				--primary-soft: #ccfbf1;
				--accent: #f59e0b;
				--accent-soft: #fef3c7;
				--bg-from: #fef9f3;
				--bg-to: #f0fdfa;
				--surface: #ffffff;
				--border: #e7e5e4;
				--text: #1c1917;
				--text-muted: #78716c;
				--user-bubble: #0f766e;
				--user-bubble-text: #ffffff;
				--assistant-bubble: #faf8f4;
				--assistant-bubble-border: #f1ede4;
				--assistant-bubble-text: #1c1917;
				--shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
				--shadow-md: 0 12px 32px rgba(15, 118, 110, 0.1);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				height: 100%;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Oxygen,
					Ubuntu, Cantarell, sans-serif;
				font-size: 15px;
				line-height: 1.55;
				color: var(--text);
				background:
					radial-gradient(
						circle at top right,
						rgba(245, 158, 11, 0.12),
						transparent 55%
					),
					radial-gradient(
						circle at bottom left,
						rgba(15, 118, 110, 0.1),
						transparent 55%
					),
					linear-gradient(180deg, var(--bg-from) 0%, var(--bg-to) 100%);
				background-attachment: fixed;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 1.25rem;
			}

			.app {
				width: 100%;
				max-width: 820px;
				display: flex;
				flex-direction: column;
				gap: 1rem;
				flex: 1;
			}

			header {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 0.85rem 1.1rem;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 1rem;
				box-shadow: var(--shadow-sm);
			}

			.brand {
				display: flex;
				align-items: center;
				gap: 0.75rem;
				min-width: 0;
			}

			.brand-logo {
				width: 40px;
				height: 40px;
				border-radius: 11px;
				background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
				display: grid;
				place-items: center;
				color: white;
				flex-shrink: 0;
				box-shadow: 0 4px 12px rgba(15, 118, 110, 0.2);
			}

			.brand-logo svg {
				width: 22px;
				height: 22px;
			}

			.brand-text {
				min-width: 0;
				line-height: 1.2;
			}

			.brand-name {
				font-size: 1rem;
				font-weight: 700;
				letter-spacing: -0.01em;
			}

			.brand-sub {
				font-size: 0.78rem;
				color: var(--text-muted);
				font-style: italic;
			}

			.role-info {
				display: flex;
				align-items: center;
				gap: 0.6rem;
				font-size: 0.85rem;
				color: var(--text-muted);
				flex-shrink: 0;
			}

			.role-pill {
				background: var(--primary-soft);
				color: var(--primary);
				font-weight: 600;
				font-size: 0.75rem;
				padding: 0.25rem 0.65rem;
				border-radius: 999px;
				text-transform: capitalize;
				letter-spacing: 0.02em;
			}

			.role-info a {
				color: var(--text-muted);
				text-decoration: none;
				border-bottom: 1px dashed var(--border);
				padding-bottom: 1px;
				transition: color 0.15s, border-color 0.15s;
			}

			.role-info a:hover {
				color: var(--primary);
				border-bottom-color: var(--primary);
			}

			.chat-container {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 14px;
				box-shadow: var(--shadow-md);
				display: flex;
				flex-direction: column;
				flex: 1;
				min-height: 480px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.25rem;
				display: flex;
				flex-direction: column;
				gap: 0.55rem;
				scroll-behavior: smooth;
			}

			.message {
				max-width: 78%;
				padding: 0.7rem 0.95rem;
				border-radius: 14px;
				font-size: 0.95rem;
				line-height: 1.5;
				box-shadow: var(--shadow-sm);
				animation: fadeUp 200ms ease-out;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background: var(--user-bubble);
				color: var(--user-bubble-text);
				align-self: flex-end;
				border-bottom-right-radius: 4px;
			}

			.assistant-message {
				background: var(--assistant-bubble);
				color: var(--assistant-bubble-text);
				border: 1px solid var(--assistant-bubble-border);
				align-self: flex-start;
				border-bottom-left-radius: 4px;
			}

			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(4px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.typing-indicator {
				display: none;
				padding: 0.4rem 1.25rem 0.6rem;
				align-items: center;
				gap: 5px;
			}

			.typing-indicator.visible {
				display: flex;
			}

			.typing-indicator .dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--text-muted);
				animation: blink 1.2s infinite ease-in-out;
			}

			.typing-indicator .dot:nth-child(2) {
				animation-delay: 0.2s;
			}

			.typing-indicator .dot:nth-child(3) {
				animation-delay: 0.4s;
			}

			@keyframes blink {
				0%,
				80%,
				100% {
					opacity: 0.25;
					transform: scale(0.9);
				}
				40% {
					opacity: 1;
					transform: scale(1);
				}
			}

			.message-input {
				display: flex;
				align-items: flex-end;
				gap: 0.5rem;
				padding: 0.85rem;
				border-top: 1px solid var(--border);
				background: var(--surface);
			}

			#user-input {
				flex: 1;
				padding: 0.7rem 0.9rem;
				border: 1px solid var(--border);
				border-radius: 12px;
				font-family: inherit;
				font-size: 0.95rem;
				color: var(--text);
				resize: none;
				min-height: 44px;
				max-height: 160px;
				outline: none;
				background: #fff;
				transition: border-color 0.15s, box-shadow 0.15s;
			}

			#user-input::placeholder {
				color: #94a3b8;
			}

			#user-input:focus {
				border-color: var(--primary);
				box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
			}

			#send-button {
				flex-shrink: 0;
				width: 44px;
				height: 44px;
				display: grid;
				place-items: center;
				background: var(--primary);
				color: white;
				border: none;
				border-radius: 12px;
				cursor: pointer;
				transition: background-color 0.2s, transform 0.1s;
			}

			#send-button:hover:not(:disabled) {
				background: var(--primary-hover);
				transform: translateY(-1px);
			}

			#send-button:disabled {
				background: #cbd5e1;
				cursor: not-allowed;
			}

			#send-button svg {
				width: 18px;
				height: 18px;
			}

			footer {
				text-align: center;
				font-size: 0.78rem;
				color: var(--text-muted);
			}

			.qr-widget {
				position: fixed;
				bottom: 1.25rem;
				right: 1.25rem;
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 0.6rem 0.7rem 0.55rem;
				box-shadow: var(--shadow-md);
				text-align: center;
				z-index: 10;
			}

			.qr-widget img {
				display: block;
				width: 88px;
				height: 88px;
				border-radius: 6px;
			}

			.qr-widget-label {
				margin-top: 0.4rem;
				font-size: 0.65rem;
				color: var(--text-muted);
				letter-spacing: 0.06em;
				text-transform: uppercase;
				font-weight: 600;
			}

			@media (max-width: 540px) {
				body {
					padding: 0.75rem;
				}
				.brand-sub {
					display: none;
				}
				.message {
					max-width: 88%;
				}
				.qr-widget {
					display: none;
				}
			}
		</style>
	</head>
	<body>
		<div class="app">
			<header>
				<div class="brand">
					<div class="brand-logo" aria-hidden="true">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="1.8"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="17" cy="6" r="1.7" fill="currentColor" stroke="none" />
							<path d="M2 20 L8 11 L12 16 L16 9 L22 20 Z" />
							<line x1="2" y1="20" x2="22" y2="20" />
						</svg>
					</div>
					<div class="brand-text">
						<div class="brand-name">AITinerary</div>
						<div class="brand-sub">AI travel concierge</div>
					</div>
				</div>
			</header>

			<div class="chat-container">
				<div id="chat-messages" class="chat-messages">
					<div class="message assistant-message">
						<p>
							Hi! Ask me anything about our travel packages and I'll help you
							find the right one.
						</p>
					</div>
				</div>

				<div class="typing-indicator" id="typing-indicator">
					<span class="dot"></span>
					<span class="dot"></span>
					<span class="dot"></span>
				</div>

				<div class="message-input">
					<textarea
						id="user-input"
						placeholder="Ask about a destination, package, or itinerary…"
						rows="1"
						autofocus
					></textarea>
					<button id="send-button" aria-label="Send">
						<svg
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<line x1="22" y1="2" x2="11" y2="13"></line>
							<polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
						</svg>
					</button>
				</div>
			</div>

			<footer>AITinerary · <a href="/employee">Personal? Acceder</a></footer>
		</div>

		<aside
			class="qr-widget"
			aria-label="QR code to open Adventure Premium on a phone"
		>
			<img
				src="https://api.qrserver.com/v1/create-qr-code/?size=176x176&margin=4&data=https%3A%2F%2Fhackathon2026.cloudflarehackathon.workers.dev%2F"
				alt="Scan to open Adventure Premium on mobile"
				width="88"
				height="88"
			/>
			<div class="qr-widget-label">Try it</div>
		</aside>

		<script src="chat.js"></script>
	</body>
</html>
