<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign in · Cloudflare AI Chat</title>
		<style>
			:root {
				--primary-color: #2563eb;
				--primary-hover: #1d4ed8;
				--accent-color: #0ea5e9;
				--accent-hover: #0284c7;
				--light-bg: #f1f5f9;
				--border-color: #dbeafe;
				--text-color: #1e293b;
				--text-light: #64748b;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				background-color: var(--light-bg);
				color: var(--text-color);
				padding: 1rem;
			}

			.card {
				background: white;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				padding: 2.5rem;
				max-width: 420px;
				width: 100%;
				text-align: center;
				box-shadow: 0 4px 20px rgba(37, 99, 235, 0.08);
			}

			h1 {
				font-size: 1.5rem;
				color: var(--primary-color);
				margin-bottom: 0.5rem;
			}

			p.subtitle {
				color: var(--text-light);
				margin-bottom: 2rem;
			}

			.role-buttons {
				display: flex;
				flex-direction: column;
				gap: 0.75rem;
			}

			.role-button {
				padding: 0.9rem 1.25rem;
				font-size: 1rem;
				font-family: inherit;
				border: none;
				border-radius: 8px;
				color: white;
				cursor: pointer;
				transition: background-color 0.2s, transform 0.1s;
			}

			.role-button:hover {
				transform: translateY(-1px);
			}

			.role-button.employee {
				background-color: var(--primary-color);
			}

			.role-button.employee:hover {
				background-color: var(--primary-hover);
			}

			.role-button.client {
				background-color: var(--accent-color);
			}

			.role-button.client:hover {
				background-color: var(--accent-hover);
			}
		</style>
	</head>
	<body>
		<main class="card">
			<h1>Welcome</h1>
			<p class="subtitle">Choose how you'd like to sign in.</p>

			<div class="role-buttons">
				<button class="role-button employee" data-role="employee">
					Enter as Employee
				</button>
				<button class="role-button client" data-role="client">
					Enter as Client
				</button>
			</div>
		</main>

		<script>
			document.querySelectorAll(".role-button").forEach((btn) => {
				btn.addEventListener("click", () => {
					localStorage.setItem("role", btn.dataset.role);
					window.location.href = "/chat.html";
				});
			});
		</script>
	</body>
</html>
